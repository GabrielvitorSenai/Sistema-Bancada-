# Configuração usada pelos testes automatizados (JUnit 5 + H2 em memória).
#
# Nos testes, o banco H2 embutido substitui o MySQL de produção para não poluir
# o dbSmart40 real (Etapa 4). Isso é feito de duas formas complementares:
#   1. app.datasource.manual.enabled=false desliga o DataSourceManualConfig
#      (que aponta para o MySQL), deixando o Spring Boot autoconfigurar o H2.
#   2. As propriedades spring.datasource.* abaixo apontam para um H2 em memória
#      em modo de compatibilidade MySQL.
#
# Os testes de fatia (@DataJpaTest) já usam um H2 embutido próprio; estas
# propriedades servem principalmente aos testes de contexto completo
# (@SpringBootTest) de integração, persistência e concorrência.

app.datasource.manual.enabled=false

spring.datasource.url=jdbc:h2:mem:dbSmart40;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Evita que o arquivo externo de banco (config/db-config.properties) seja
# carregado por cima destas configurações de teste.
db.config.path=

estoque.api.url=http://localhost:8088/estoque
expedicao.api.url=http://localhost:8088/expedicao
