# Configuração usada apenas pelos testes (@DataJpaTest). O datasource H2
# embutido é escolhido automaticamente pelo Spring Boot; aqui só ajustamos o
# dialeto (o application.properties principal força o dialeto MySQL) e
# evitamos que o arquivo externo de banco (config/db-config.properties) seja
# carregado por cima destas configurações de teste.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
db.config.path=

estoque.api.url=http://localhost:8088/estoque
expedicao.api.url=http://localhost:8088/expedicao
