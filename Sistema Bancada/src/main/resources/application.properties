spring.application.name=painel-linha-didatica

# Arquivo opcional. Se ele não existir, o sistema usa as configurações abaixo.
db.config.path=${DB_CONFIG_PATH:./config/db-config.properties}

# Porta do servidor. Sobrescreva com a variável de ambiente SERVER_PORT.
server.port=${SERVER_PORT:8088}

# Banco local padrão do projeto.
# Cada valor pode ser sobrescrito por variável de ambiente do Spring Boot
# (SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD),
# mantendo o padrão local abaixo quando a variável não for informada.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/dbSmart40?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:senai}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

estoque.api.url=http://localhost:8088/estoque
expedicao.api.url=http://localhost:8088/expedicao
