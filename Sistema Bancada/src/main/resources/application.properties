spring.application.name=painel-linha-didatica

# Arquivo opcional. Se ele não existir, o sistema usa as configurações abaixo.
db.config.path=./config/db-config.properties

server.port=8088

# Banco local padrão do projeto.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/dbSmart40?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=senai

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

estoque.api.url=http://localhost:8088/estoque
expedicao.api.url=http://localhost:8088/expedicao
